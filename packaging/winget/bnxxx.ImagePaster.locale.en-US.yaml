PackageUrl: https://github.com/bnxxx/Image-Paster
License: MIT
LicenseUrl: https://github.com/bnxxx/Image-Paster/blob/main/LICENSE
ShortDescription: Lightweight native Windows Explorer context menu utility to paste clipboard images directly into folders and extract OCR text.
Description: |-
  Clipboard Image Paster adds "Paste clipboard image" and "Paste image & transcribe text (OCR)" options directly to your Windows Explorer right-click context menu (both on folder icons and inside open folder backgrounds).
  - Instant and silent saving of clipboard images as timestamped PNGs.
  - Native Windows AI Optical Character Recognition (OCR) to extract text directly from clipboard images with full line-break preservation into clean .txt files without saving the image.
  - Hold SHIFT while clicking for custom filename and format selection (PNG, JPG, BMP).
  - Zero external dependency requirements, ~20KB standalone binary.
Moniker: clipboardpaster
